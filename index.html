<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 공정표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
    <style>
        /* 커스텀 스크롤바 (이제 스크롤이 생기지 않으므로 숨김 목적 포함) */
        ::-webkit-scrollbar { width: 0px; display: none; }

        /* ★ 웹 & 인쇄 공통: 표 전체를 화면 높이에 꽉 차게 균등 분배 (스크롤 완전 차단) ★ */
        #table-container {
            overflow: hidden !important; /* 스크롤바 완전히 제거 */
            min-height: 0 !important; /* 내용물이 컨테이너를 강제로 늘리는 현상 방지 (핵심) */
        }
        table {
            table-layout: fixed !important; /* 표 너비와 높이를 비율에 맞춰 강제 분배 */
            height: 100% !important; /* 테이블 높이를 부모 컨테이너에 100% 맞춤 */
            margin: 0 !important;
        }
        thead th {
            height: auto !important;
            padding: 4px 2px !important;
            font-size: clamp(10px, 1.2vh, 13px) !important;
            font-weight: 600 !important;
        }
        #dataTableBody tr { 
            height: 1% !important; /* 전체 남은 높이를 행 개수만큼 똑같이 N등분 */
        }
        #dataTableBody td { 
            height: 1% !important; 
            padding: 0 !important; /* 셀 여백을 없애서 내용이 꽉 차게 함 */
            font-size: clamp(9px, 1.5vh, 14px) !important; /* 화면 높이에 맞춰 폰트 크기 자동 조절 */
            line-height: 1.1 !important; /* 텍스트 상하 여백 최소화 */
        }
        #dataTableBody input {
            width: 100%;
            height: 100% !important;
            min-height: 0 !important; /* 입력칸의 고정 최소 높이 완전히 제거 (핵심) */
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            background: transparent !important;
            text-align: center;
            box-shadow: none !important;
            font-size: inherit !important; /* 부모 td의 clamp 폰트 크기를 그대로 상속 */
        }
        #dataTableBody input:focus {
            background-color: #dbeafe !important;
            outline: 2px solid #3b82f6 !important;
            outline-offset: -2px;
        }
        /* 입력칸 배경색 (웹 화면용) */
        .cell-planned { background-color: #eff6ff; }
        .cell-actual { background-color: #fef2f2; }


        /* 완벽한 인쇄용 최적화 스타일 */
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            
            body, html { 
                background: white !important; 
                color: black !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                margin: 0 !important; 
                padding: 0 !important;
                width: 100% !important;
                height: auto !important; /* 화면 모드의 100vh 무력화 */
            }
            
            button, .print-hidden, #toastMessage { display: none !important; }
            
            .max-w-7xl { 
                max-width: none !important; 
                width: 100% !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                border-radius: 0 !important; 
                height: auto !important; /* 화면 모드의 100% 무력화 */
            }
            
            .bg-blue-600 {
                background: white !important;
                color: black !important;
                border-bottom: 1px solid #d1d5db !important;
                padding: 0 0 5px 0 !important;
                margin-bottom: 10px !important;
            }
            .bg-blue-600 h1 { color: black !important; font-size: 18px !important; }

            /* Grid를 사용한 1단 가로 배치 */
            #main-wrapper {
                display: grid !important;
                grid-template-columns: 32% 66% !important;
                gap: 2% !important;
                align-items: stretch !important;
                height: auto !important;
                min-height: 0 !important;
            }
            
            #left-panel, #right-panel {
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important; 
                border: none !important;
                padding: 0 !important;
            }

            table { 
                border-collapse: collapse !important; 
            }
            thead { display: table-header-group !important; }
            tr { page-break-inside: avoid !important; }
            
            th, td { 
                border: 1px solid #d1d5db !important; 
                font-size: 10px !important; 
            }
            th { background-color: #f3f4f6 !important; color: #000 !important; }
            
            input { font-size: 10px !important; color: black !important; }

            .bg-blue-50.rounded-lg.border {
                border: 1px solid #d1d5db !important; 
                background: transparent !important;
                margin-top: 5px !important;
                padding: 5px !important;
            }
            .bg-blue-50 span { color: black !important; font-size: 11px !important; }

            .grid-cols-3 {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 8px !important;
                margin-bottom: 15px !important;
            }
            .grid-cols-3 > div {
                border: 1px solid #d1d5db !important; 
                background: transparent !important;
                padding: 8px !important;
                border-radius: 0 !important;
            }
            .grid-cols-3 p { color: black !important; }
            .text-xl, .md\:text-3xl { font-size: 1.1rem !important; }
            
            .flex-grow.relative.w-full {
                height: 460px !important;
                max-height: 460px !important;
                display: block !important;
            }
            canvas {
                width: 100% !important;
                height: 100% !important;
                max-height: 460px !important;
            }
        }
    </style>
</head>
<!-- h-screen 적용 및 여백을 최적화하여 1페이지 안에 모두 담기도록 함 -->
<body class="bg-gray-50 h-screen p-2 md:p-4 font-sans text-gray-800 flex flex-col">

    <div class="max-w-7xl w-full mx-auto bg-white rounded-xl shadow-lg overflow-hidden flex flex-col flex-grow min-h-0">
        <!-- 상단 제목 -->
        <div class="bg-blue-600 text-white px-4 py-3 shrink-0">
            <h1 class="text-xl md:text-2xl font-bold">📈 전체 공정표</h1>
            <p class="text-blue-100 text-xs md:text-sm mt-1 print-hidden">월별 공정률을 입력하면 누계 공정률 S-Curve가 자동으로 생성됩니다.</p>
        </div>

        <!-- 메인 래퍼: 높이를 화면에 맞게 고정하여 내부 요소만 수축하도록 설정 -->
        <div id="main-wrapper" class="flex flex-col md:flex-row flex-grow min-h-0 p-3 gap-4">
            
            <!-- 좌측: 데이터 입력 부 -->
            <div id="left-panel" class="w-full md:w-1/3 border-r border-gray-200 pr-2 flex flex-col h-full min-h-0">
                <div class="flex flex-col mb-3 gap-2 print-hidden shrink-0">
                    <div class="flex justify-between items-center">
                        <h2 class="text-md md:text-lg font-semibold">데이터 입력</h2>
                        <div class="space-x-1 flex flex-wrap justify-end gap-y-1">
                            <button onclick="window.print()" class="px-2 py-1 bg-gray-50 text-gray-700 rounded-md text-xs font-medium hover:bg-gray-200 transition border border-gray-300">🖨️ 인쇄</button>
                            <button onclick="saveData()" class="px-2 py-1 bg-green-50 text-green-700 rounded-md text-xs font-medium hover:bg-green-100 transition border border-green-200">💾 저장</button>
                            <button onclick="addRow()" class="px-2 py-1 bg-blue-50 text-blue-600 rounded-md text-xs font-medium hover:bg-blue-100 transition" title="1개월 추가">+1행</button>
                            <button onclick="removeRow()" class="px-2 py-1 bg-red-50 text-red-600 rounded-md text-xs font-medium hover:bg-red-100 transition" title="1개월 삭제">-1행</button>
                        </div>
                    </div>
                </div>

                <!-- 표 컨테이너: flex-grow와 min-h-0을 결합하여 절대 화면을 벗어나지 않게 함 -->
                <div id="table-container" class="flex-grow bg-white rounded-lg border border-gray-200 flex flex-col min-h-0">
                    <table class="w-full text-center">
                        <thead class="text-gray-600 bg-gray-50">
                            <tr>
                                <th class="border-b border-gray-200">기간(월)</th>
                                <th class="text-blue-800 border-b border-gray-200">계획 월간(%)</th>
                                <th class="text-blue-600 border-b border-gray-200">계획 누계(%)</th>
                                <th class="text-red-800 border-b border-gray-200">실적 월간(%)</th>
                                <th class="text-red-600 border-b border-gray-200">실적 누계(%)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <!-- JS로 행이 동적으로 추가됩니다 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 하단 계획 누계 영역 -->
                <div class="mt-3 p-2 bg-blue-50 rounded-lg border border-blue-100 shrink-0">
                    <div class="flex justify-between items-center text-xs md:text-sm font-bold text-blue-800">
                        <span>계획 최종 누계 (%):</span>
                        <span id="finalTotal">0.00</span>
                    </div>
                    <p id="warningText" class="text-[10px] text-red-500 mt-1 hidden print-hidden">※ 계획 누계가 100을 초과하거나 미달입니다.</p>
                </div>
            </div>

            <!-- 우측: 차트 표시 부 -->
            <div id="right-panel" class="w-full md:w-2/3 pl-2 flex flex-col h-full min-h-0 relative">
                
                <!-- 현황 요약 대시보드 -->
                <div class="grid grid-cols-3 gap-2 md:gap-4 mb-3 shrink-0">
                    <div class="bg-blue-50 p-2 md:p-4 rounded-xl border border-blue-100 text-center shadow-sm">
                        <p class="text-[10px] md:text-xs text-blue-800 font-bold mb-1">현재 계획누계 (%)</p>
                        <p id="sum-planned" class="text-lg md:text-2xl font-black text-blue-600">0.00</p>
                    </div>
                    <div class="bg-red-50 p-2 md:p-4 rounded-xl border border-red-100 text-center shadow-sm">
                        <p class="text-[10px] md:text-xs text-red-800 font-bold mb-1">현재 실적누계 (%)</p>
                        <p id="sum-actual" class="text-lg md:text-2xl font-black text-red-600">0.00</p>
                    </div>
                    <div class="bg-gray-50 p-2 md:p-4 rounded-xl border border-gray-200 text-center shadow-sm">
                        <p class="text-[10px] md:text-xs text-gray-700 font-bold mb-1">계획대비 달성률 (%)</p>
                        <p id="sum-ratio" class="text-lg md:text-2xl font-black text-gray-800">0.0</p>
                    </div>
                </div>

                <!-- 차트 캔버스 -->
                <div class="flex-grow relative w-full min-h-0">
                    <canvas id="sCurveChart" class="w-full h-full"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 토스트 메시지 UI (알림용) -->
    <div id="toastMessage" class="fixed bottom-6 right-6 bg-gray-800 text-white px-5 py-3 rounded-lg shadow-xl transition-opacity duration-300 opacity-0 pointer-events-none z-50 font-medium print-hidden">
        메시지
    </div>

    <script>
        // 초기 26개월 데이터
        const defaultData = [
            { month: '1', planned: 1.0, actual: 1.0 },
            { month: '2', planned: 1.5, actual: 1.5 },
            { month: '3', planned: 2.0, actual: 2.2 },
            { month: '4', planned: 2.5, actual: 2.5 },
            { month: '5', planned: 3.0, actual: 3.1 },
            { month: '6', planned: 4.0, actual: 3.8 },
            { month: '7', planned: 5.0, actual: '' },
            { month: '8', planned: 6.0, actual: '' },
            { month: '9', planned: 7.0, actual: '' },
            { month: '10', planned: 7.5, actual: '' },
            { month: '11', planned: 8.0, actual: '' },
            { month: '12', planned: 8.0, actual: '' },
            { month: '13', planned: 7.5, actual: '' },
            { month: '14', planned: 7.0, actual: '' },
            { month: '15', planned: 6.0, actual: '' },
            { month: '16', planned: 5.0, actual: '' },
            { month: '17', planned: 4.0, actual: '' },
            { month: '18', planned: 3.5, actual: '' },
            { month: '19', planned: 3.0, actual: '' },
            { month: '20', planned: 2.5, actual: '' },
            { month: '21', planned: 2.0, actual: '' },
            { month: '22', planned: 1.5, actual: '' },
            { month: '23', planned: 1.0, actual: '' },
            { month: '24', planned: 0.5, actual: '' },
            { month: '25', planned: 0.5, actual: '' },
            { month: '26', planned: 0.5, actual: '' }
        ];

        let data = JSON.parse(JSON.stringify(defaultData));
        let chartInstance = null;

        function init() {
            if (typeof Chart === 'undefined') {
                console.warn('Chart.js 로드 대기중...');
                setTimeout(init, 100);
                return;
            }

            const savedData = localStorage.getItem('sCurveData_v1');
            if (savedData) {
                try {
                    data = JSON.parse(savedData);
                    setTimeout(() => showToast('저장된 데이터를 불러왔습니다.'), 500);
                } catch (e) {
                    console.error("데이터 불러오기 실패", e);
                }
            }

            renderTable();
            updateChart();
        }

        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            toast.innerText = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        function saveData() {
            localStorage.setItem('sCurveData_v1', JSON.stringify(data));
            showToast('데이터가 브라우저에 저장되었습니다!');
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            let plannedCum = 0;
            let actualCum = 0;

            data.forEach((row, index) => {
                plannedCum += parseFloat(row.planned) || 0;
                
                let actualCellHtml = '-';
                if (row.actual !== '' && row.actual !== null) {
                    actualCum += parseFloat(row.actual) || 0;
                    actualCellHtml = `${actualCum.toFixed(2)}`;
                }
                
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-200 hover:bg-gray-50"; 
                
                tr.innerHTML = `
                    <td class="align-middle">
                        <input type="text" value="${row.month}" onchange="updateData(${index}, 'month', this.value)" 
                               class="font-medium text-gray-800">
                    </td>
                    <td class="align-middle cell-planned border-l border-r border-white">
                        <input type="number" step="0.01" value="${row.planned}" onchange="updateData(${index}, 'planned', this.value)" 
                               class="text-blue-900">
                    </td>
                    <td class="font-semibold ${plannedCum > 100 ? 'text-red-500' : 'text-blue-600'} align-middle">
                        ${plannedCum.toFixed(2)}
                    </td>
                    <td class="align-middle cell-actual border-l border-r border-white">
                        <input type="number" step="0.01" value="${row.actual}" onchange="updateData(${index}, 'actual', this.value)" placeholder="-"
                               class="text-red-900">
                    </td>
                    <td class="font-semibold text-red-600 align-middle">
                        ${actualCellHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const finalTotal = document.getElementById('finalTotal');
            const warningText = document.getElementById('warningText');
            
            finalTotal.innerText = `${plannedCum.toFixed(2)}`;
            if (Math.abs(plannedCum - 100) > 0.1) {
                warningText.classList.remove('hidden');
                finalTotal.classList.add('text-red-600');
            } else {
                warningText.classList.add('hidden');
                finalTotal.classList.remove('text-red-600');
            }
            
            updateSummaryBox();
        }

        function updateSummaryBox() {
            let currentPlanned = 0;
            let currentActual = 0;
            let lastActualIndex = -1;

            for (let i = 0; i < data.length; i++) {
                if (data[i].actual !== '' && data[i].actual !== null) {
                    lastActualIndex = i;
                }
            }

            if (lastActualIndex >= 0) {
                for (let i = 0; i <= lastActualIndex; i++) {
                    currentPlanned += parseFloat(data[i].planned) || 0;
                    currentActual += parseFloat(data[i].actual) || 0;
                }
            }

            let ratio = 0;
            if (currentPlanned > 0) {
                ratio = (currentActual / currentPlanned) * 100;
            }

            document.getElementById('sum-planned').innerText = currentPlanned.toFixed(2);
            document.getElementById('sum-actual').innerText = currentActual.toFixed(2);
            
            const ratioEl = document.getElementById('sum-ratio');
            
            if (lastActualIndex === -1) {
                ratioEl.innerText = '-';
                ratioEl.className = 'text-lg md:text-2xl font-black text-gray-400';
            } else {
                ratioEl.innerText = ratio.toFixed(1);
                if (ratio >= 100) {
                    ratioEl.className = 'text-lg md:text-2xl font-black text-blue-600';
                } else if (ratio >= 95) {
                    ratioEl.className = 'text-lg md:text-2xl font-black text-green-600';
                } else {
                    ratioEl.className = 'text-lg md:text-2xl font-black text-red-600';
                }
            }
        }

        function updateData(index, field, newValue) {
            if (field === 'planned' || field === 'actual') {
                data[index][field] = newValue === '' ? '' : (parseFloat(newValue) || 0);
            } else {
                data[index].month = newValue;
            }
            renderTable();
            updateChart();
        }

        function addRow() {
            const nextMonthNum = data.length + 1;
            data.push({ month: `${nextMonthNum}`, planned: 0, actual: '' });
            renderTable();
            updateChart();
        }

        function removeRow() {
            if (data.length > 1) {
                data.pop();
                renderTable();
                updateChart();
            }
        }

        function updateChart() {
            const ctx = document.getElementById('sCurveChart').getContext('2d');
            
            const labels = data.map(d => d.month);
            const plannedMonthly = data.map(d => parseFloat(d.planned) || 0);
            
            let plannedCumData = [];
            let pSum = 0;
            for(let val of plannedMonthly) {
                pSum += val;
                plannedCumData.push(pSum.toFixed(2));
            }

            const actualMonthly = [];
            let actualCumData = [];
            let aSum = 0;

            for(let i=0; i<data.length; i++) {
                if (data[i].actual !== '' && data[i].actual !== null) {
                    let val = parseFloat(data[i].actual) || 0;
                    actualMonthly.push(val);
                    aSum += val;
                    actualCumData.push(aSum.toFixed(2));
                } else {
                    actualMonthly.push(null);
                    actualCumData.push(null);
                }
            }

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'line',
                            label: '계획 누계공정률 (%)',
                            data: plannedCumData,
                            borderColor: '#2563eb',
                            backgroundColor: '#2563eb',
                            borderWidth: 3,
                            pointBackgroundColor: '#ffffff',
                            pointBorderColor: '#2563eb',
                            pointBorderWidth: 2,
                            pointRadius: 3,
                            tension: 0.4, 
                            yAxisID: 'y',
                            fill: false,
                            order: 1
                        },
                        {
                            type: 'line',
                            label: '실적 누계공정률 (%)',
                            data: actualCumData,
                            borderColor: '#dc2626',
                            backgroundColor: '#dc2626',
                            borderWidth: 3,
                            pointBackgroundColor: '#ffffff',
                            pointBorderColor: '#dc2626',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            tension: 0.4,
                            yAxisID: 'y',
                            fill: false,
                            spanGaps: false,
                            order: 2
                        },
                        {
                            type: 'bar',
                            label: '계획 월간공정률 (%)',
                            data: plannedMonthly,
                            backgroundColor: 'rgba(147, 197, 253, 0.5)',
                            borderColor: 'rgba(59, 130, 246, 0.7)',
                            borderWidth: 1,
                            borderRadius: 2,
                            yAxisID: 'y',
                            order: 3
                        },
                        {
                            type: 'bar',
                            label: '실적 월간공정률 (%)',
                            data: actualMonthly,
                            backgroundColor: 'rgba(252, 165, 165, 0.7)',
                            borderColor: 'rgba(220, 38, 38, 0.8)',
                            borderWidth: 1,
                            borderRadius: 2,
                            yAxisID: 'y',
                            order: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: '전체 공정표',
                            font: { size: 18, weight: 'bold' },
                            padding: { top: 10, bottom: 30 }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y;
                                },
                                title: function(context) {
                                    return context[0].label + '개월'; 
                                }
                            }
                        },
                        legend: {
                            position: 'bottom'
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '공정률 (%)'
                            },
                            min: 0,
                            max: 100,
                            grid: {
                                color: '#e5e7eb',
                                borderDash: [5, 5]
                            }
                        }
                    }
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>

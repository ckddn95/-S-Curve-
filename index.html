<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 공정표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
    <style>
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* 완벽한 인쇄용 최적화 스타일 (Grid 기반 강제 고정 및 꽉 찬 레이아웃) */
        @media print {
            /* 여백을 5mm로 줄여 한 페이지에 넉넉히 들어오도록 수정 */
            @page { size: A4 landscape; margin: 5mm; }
            
            /* 기본 초기화 */
            body, html { 
                background: white !important; 
                color: black !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                margin: 0 !important; 
                padding: 0 !important;
                width: 100% !important;
            }
            
            /* 숨길 요소들 완벽 차단 */
            button, .print-hidden, #toastMessage { display: none !important; }
            
            /* 메인 컨테이너 그림자/여백/크기 초기화 */
            .max-w-7xl { 
                max-width: none !important; 
                width: 100% !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                border-radius: 0 !important; 
            }
            
            /* 상단 타이틀 영역 살리기 (테두리 연하게, 여백 축소) */
            .bg-blue-600 {
                background: white !important;
                color: black !important;
                border-bottom: 1px solid #d1d5db !important;
                padding: 0 0 5px 0 !important;
                margin-bottom: 10px !important;
            }
            .bg-blue-600 h1 { color: black !important; font-size: 18px !important; }

            /* ★ 핵심: Grid를 사용한 완벽한 1단 가로 배치 및 높이 스트레치 ★ */
            #main-wrapper {
                display: grid !important;
                grid-template-columns: 32% 66% !important;
                gap: 2% !important;
                align-items: stretch !important; /* 좌우 패널의 높이를 무조건 동일하게 강제 */
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
            }
            
            /* 좌측 패널: 높이를 100%로 채우고 내부 요소를 flex로 분배 */
            #left-panel {
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important; 
                border: none !important;
                padding: 0 !important;
            }

            /* 우측 패널 */
            #right-panel {
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important;
                border: none !important;
                padding: 0 !important;
            }

            /* 표의 컨테이너를 남은 세로 공간 끝까지 채우도록 강제 */
            #table-container {
                flex-grow: 1 !important;
                height: 100% !important;
                overflow: visible !important;
                border: none !important;
                padding: 0 !important;
            }

            /* --- 표(Table) 인쇄 디자인 --- */
            table { 
                width: 100% !important; 
                height: 100% !important; /* 표를 컨테이너 높이에 100% 맞춤 */
                border-collapse: collapse !important; 
            }
            thead { display: table-header-group !important; } /* 페이지 넘어갈 때 헤더 반복 */
            tr { page-break-inside: avoid !important; }
            
            /* ★ 표 내부 행 높이를 균등하게 분배 (특정 행만 커지는 현상 방지) ★ */
            tbody tr { height: 1% !important; }

            /* 표 내부 모든 셀의 폰트 크기를 통일 (Tailwind 클래스 무시) */
            th, td { 
                border: 1px solid #d1d5db !important; /* 진한 선을 연한 회색으로 변경 */
                padding: 2px 1px !important; /* 여백 축소 */
                font-size: 10px !important; /* 셀 폰트 강제 고정 */
                line-height: 1.2 !important;
            }
            th { background-color: #f3f4f6 !important; font-weight: bold !important; color: #000 !important; }
            
            /* Input 태그를 일반 텍스트처럼 보이도록 변환하며 폰트 크기 통일 */
            input { 
                border: none !important; 
                background: transparent !important; 
                text-align: center !important; 
                font-size: 10px !important; /* 입력칸 폰트 강제 고정 */
                line-height: 1.2 !important;
                width: 100% !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                color: black !important; 
                box-shadow: none !important;
            }

            /* 하단 계획 누계 텍스트 박스 */
            .bg-blue-50.rounded-lg.border {
                border: 1px solid #d1d5db !important; /* 연한 선 */
                background: transparent !important;
                margin-top: 5px !important;
                padding: 5px !important;
            }
            .bg-blue-50 span { color: black !important; font-size: 11px !important; }

            /* --- 우측 대시보드 및 차트 --- */
            .grid-cols-3 {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 8px !important;
                margin-bottom: 15px !important;
            }
            .grid-cols-3 > div {
                border: 1px solid #d1d5db !important; /* 연한 선 */
                background: transparent !important;
                padding: 8px !important;
                border-radius: 0 !important;
            }
            .grid-cols-3 p { color: black !important; }
            .text-xl, .md\:text-3xl { font-size: 1.1rem !important; }
            
            /* 차트 컨테이너 높이 픽스 (한 페이지에 들어오도록 460px로 제한) */
            .flex-grow.relative.w-full {
                height: 460px !important;
                max-height: 460px !important;
                display: block !important;
            }
            canvas {
                width: 100% !important;
                height: 100% !important;
                max-height: 460px !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden flex flex-col h-full">
        <!-- 상단 제목 -->
        <div class="bg-blue-600 text-white px-6 py-4">
            <h1 class="text-2xl font-bold">📈 전체 공정표</h1>
            <p class="text-blue-100 text-sm mt-1 print-hidden">월별 공정률을 입력하면 누계 공정률 S-Curve가 자동으로 생성됩니다.</p>
        </div>

        <!-- 메인 래퍼 (Grid 역할) - 높이 제한 해제 -->
        <div id="main-wrapper" class="flex flex-col md:flex-row min-h-[600px] flex-grow">
            
            <!-- 좌측: 데이터 입력 부 -->
            <div id="left-panel" class="w-full md:w-1/3 border-r border-gray-200 p-4 flex flex-col h-full">
                <div class="flex flex-col mb-4 gap-2 print-hidden">
                    <div class="flex justify-between items-center">
                        <h2 class="text-lg font-semibold">데이터 입력</h2>
                        <div class="space-x-1 flex flex-wrap justify-end gap-y-1">
                            <button onclick="window.print()" class="px-3 py-1 bg-gray-50 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-200 transition border border-gray-300">🖨️ 인쇄</button>
                            <button onclick="saveData()" class="px-3 py-1 bg-green-50 text-green-700 rounded-md text-sm font-medium hover:bg-green-100 transition border border-green-200">💾 저장</button>
                            <button onclick="addRow()" class="px-2 py-1 bg-blue-50 text-blue-600 rounded-md text-sm font-medium hover:bg-blue-100 transition" title="1개월 추가">+1행</button>
                            <button onclick="removeRow()" class="px-2 py-1 bg-red-50 text-red-600 rounded-md text-sm font-medium hover:bg-red-100 transition" title="1개월 삭제">-1행</button>
                        </div>
                    </div>
                </div>

                <!-- 표 래퍼를 전체 화면에서도 스크롤 없이 보여주도록 속성 변경 -->
                <div id="table-container" class="flex-grow bg-gray-50 rounded-lg p-2 border border-gray-200 flex flex-col">
                    <table class="w-full h-full text-sm text-center">
                        <thead class="text-gray-600 sticky top-0 bg-gray-50 z-10">
                            <tr>
                                <!-- 단위는 오직 제목에만 표기 -->
                                <th class="pb-2 pt-2 font-medium border-b border-gray-200">기간(월)</th>
                                <th class="pb-2 pt-2 font-medium text-blue-800 border-b border-gray-200">계획 월간(%)</th>
                                <th class="pb-2 pt-2 font-medium text-blue-600 border-b border-gray-200">계획 누계(%)</th>
                                <th class="pb-2 pt-2 font-medium text-red-800 border-b border-gray-200">실적 월간(%)</th>
                                <th class="pb-2 pt-2 font-medium text-red-600 border-b border-gray-200">실적 누계(%)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <!-- JS로 행이 동적으로 추가됩니다 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 하단 계획 누계 영역 -->
                <div class="mt-4 p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <div class="flex justify-between items-center text-sm font-bold text-blue-800">
                        <span>계획 최종 누계 (%):</span>
                        <span id="finalTotal">0.00</span>
                    </div>
                    <p id="warningText" class="text-xs text-red-500 mt-1 hidden print-hidden">※ 계획 누계가 100을 초과하거나 미달입니다. 수치를 확인해주세요.</p>
                </div>
            </div>

            <!-- 우측: 차트 표시 부 -->
            <div id="right-panel" class="w-full md:w-2/3 p-6 flex flex-col bg-white h-full relative">
                
                <!-- 현황 요약 대시보드 -->
                <div class="grid grid-cols-3 gap-3 md:gap-6 mb-4">
                    <div class="bg-blue-50 p-3 md:p-5 rounded-xl border border-blue-100 text-center shadow-sm">
                        <p class="text-xs md:text-sm text-blue-800 font-bold mb-1">현재 계획누계 (%)</p>
                        <p id="sum-planned" class="text-xl md:text-3xl font-black text-blue-600">0.00</p>
                    </div>
                    <div class="bg-red-50 p-3 md:p-5 rounded-xl border border-red-100 text-center shadow-sm">
                        <p class="text-xs md:text-sm text-red-800 font-bold mb-1">현재 실적누계 (%)</p>
                        <p id="sum-actual" class="text-xl md:text-3xl font-black text-red-600">0.00</p>
                    </div>
                    <div class="bg-gray-50 p-3 md:p-5 rounded-xl border border-gray-200 text-center shadow-sm">
                        <p class="text-xs md:text-sm text-gray-700 font-bold mb-1">계획대비 달성률 (%)</p>
                        <p id="sum-ratio" class="text-xl md:text-3xl font-black text-gray-800">0.0</p>
                    </div>
                </div>

                <!-- 차트 캔버스 -->
                <div class="flex-grow relative w-full" style="min-height: 400px;">
                    <canvas id="sCurveChart" class="w-full h-full"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 토스트 메시지 UI (알림용) -->
    <div id="toastMessage" class="fixed bottom-6 right-6 bg-gray-800 text-white px-5 py-3 rounded-lg shadow-xl transition-opacity duration-300 opacity-0 pointer-events-none z-50 font-medium print-hidden">
        메시지
    </div>

    <script>
        // 초기 26개월 데이터 ('개월' 글자 제거)
        const defaultData = [
            { month: '1', planned: 1.0, actual: 1.0 },
            { month: '2', planned: 1.5, actual: 1.5 },
            { month: '3', planned: 2.0, actual: 2.2 },
            { month: '4', planned: 2.5, actual: 2.5 },
            { month: '5', planned: 3.0, actual: 3.1 },
            { month: '6', planned: 4.0, actual: 3.8 },
            { month: '7', planned: 5.0, actual: '' },
            { month: '8', planned: 6.0, actual: '' },
            { month: '9', planned: 7.0, actual: '' },
            { month: '10', planned: 7.5, actual: '' },
            { month: '11', planned: 8.0, actual: '' },
            { month: '12', planned: 8.0, actual: '' },
            { month: '13', planned: 7.5, actual: '' },
            { month: '14', planned: 7.0, actual: '' },
            { month: '15', planned: 6.0, actual: '' },
            { month: '16', planned: 5.0, actual: '' },
            { month: '17', planned: 4.0, actual: '' },
            { month: '18', planned: 3.5, actual: '' },
            { month: '19', planned: 3.0, actual: '' },
            { month: '20', planned: 2.5, actual: '' },
            { month: '21', planned: 2.0, actual: '' },
            { month: '22', planned: 1.5, actual: '' },
            { month: '23', planned: 1.0, actual: '' },
            { month: '24', planned: 0.5, actual: '' },
            { month: '25', planned: 0.5, actual: '' },
            { month: '26', planned: 0.5, actual: '' }
        ];

        let data = JSON.parse(JSON.stringify(defaultData));
        let chartInstance = null;

        function init() {
            if (typeof Chart === 'undefined') {
                console.warn('Chart.js 로드 대기중...');
                setTimeout(init, 100);
                return;
            }

            const savedData = localStorage.getItem('sCurveData_v1');
            if (savedData) {
                try {
                    data = JSON.parse(savedData);
                    setTimeout(() => showToast('저장된 데이터를 불러왔습니다.'), 500);
                } catch (e) {
                    console.error("데이터 불러오기 실패", e);
                }
            }

            renderTable();
            updateChart();
        }

        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            toast.innerText = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        function saveData() {
            localStorage.setItem('sCurveData_v1', JSON.stringify(data));
            showToast('데이터가 브라우저에 저장되었습니다!');
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            let plannedCum = 0;
            let actualCum = 0;

            data.forEach((row, index) => {
                plannedCum += parseFloat(row.planned) || 0;
                
                let actualCellHtml = '-';
                if (row.actual !== '' && row.actual !== null) {
                    actualCum += parseFloat(row.actual) || 0;
                    // '%' 기호 제거
                    actualCellHtml = `${actualCum.toFixed(2)}`;
                }
                
                const tr = document.createElement('tr');
                tr.className = "bg-white border-b border-gray-100 hover:bg-gray-50"; 
                
                tr.innerHTML = `
                    <td class="p-1 align-middle">
                        <!-- '개월' 제거 -->
                        <input type="text" value="${row.month}" onchange="updateData(${index}, 'month', this.value)" 
                               class="w-full text-center border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 text-xs sm:text-sm p-1">
                    </td>
                    <td class="p-1 align-middle">
                        <input type="number" step="0.01" value="${row.planned}" onchange="updateData(${index}, 'planned', this.value)" 
                               class="w-full text-center border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 text-xs sm:text-sm p-1 bg-blue-50">
                    </td>
                    <td class="p-1 font-semibold text-xs sm:text-sm ${plannedCum > 100 ? 'text-red-500' : 'text-blue-600'} align-middle">
                        <!-- '%' 제거 -->
                        ${plannedCum.toFixed(2)}
                    </td>
                    <td class="p-1 align-middle">
                        <input type="number" step="0.01" value="${row.actual}" onchange="updateData(${index}, 'actual', this.value)" placeholder="-"
                               class="w-full text-center border-gray-300 rounded-md shadow-sm focus:border-red-500 focus:ring-red-500 text-xs sm:text-sm p-1 bg-red-50">
                    </td>
                    <td class="p-1 font-semibold text-xs sm:text-sm text-red-600 align-middle">
                        ${actualCellHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const finalTotal = document.getElementById('finalTotal');
            const warningText = document.getElementById('warningText');
            
            // '%' 기호 제거
            finalTotal.innerText = `${plannedCum.toFixed(2)}`;
            if (Math.abs(plannedCum - 100) > 0.1) {
                warningText.classList.remove('hidden');
                finalTotal.classList.add('text-red-600');
            } else {
                warningText.classList.add('hidden');
                finalTotal.classList.remove('text-red-600');
            }
            
            updateSummaryBox();
        }

        function updateSummaryBox() {
            let currentPlanned = 0;
            let currentActual = 0;
            let lastActualIndex = -1;

            for (let i = 0; i < data.length; i++) {
                if (data[i].actual !== '' && data[i].actual !== null) {
                    lastActualIndex = i;
                }
            }

            if (lastActualIndex >= 0) {
                for (let i = 0; i <= lastActualIndex; i++) {
                    currentPlanned += parseFloat(data[i].planned) || 0;
                    currentActual += parseFloat(data[i].actual) || 0;
                }
            }

            let ratio = 0;
            if (currentPlanned > 0) {
                ratio = (currentActual / currentPlanned) * 100;
            }

            // '%' 기호 제거
            document.getElementById('sum-planned').innerText = currentPlanned.toFixed(2);
            document.getElementById('sum-actual').innerText = currentActual.toFixed(2);
            
            const ratioEl = document.getElementById('sum-ratio');
            
            if (lastActualIndex === -1) {
                ratioEl.innerText = '-';
                ratioEl.className = 'text-xl md:text-3xl font-black text-gray-400';
            } else {
                ratioEl.innerText = ratio.toFixed(1);
                if (ratio >= 100) {
                    ratioEl.className = 'text-xl md:text-3xl font-black text-blue-600';
                } else if (ratio >= 95) {
                    ratioEl.className = 'text-xl md:text-3xl font-black text-green-600';
                } else {
                    ratioEl.className = 'text-xl md:text-3xl font-black text-red-600';
                }
            }
        }

        function updateData(index, field, newValue) {
            if (field === 'planned' || field === 'actual') {
                data[index][field] = newValue === '' ? '' : (parseFloat(newValue) || 0);
            } else {
                data[index].month = newValue;
            }
            renderTable();
            updateChart();
        }

        function addRow() {
            const nextMonthNum = data.length + 1;
            // '개월' 글자 제거
            data.push({ month: `${nextMonthNum}`, planned: 0, actual: '' });
            renderTable();
            updateChart();
            
            // 행 추가 시 창 자체를 최하단으로 스크롤하도록 변경 (내부 스크롤이 없어졌으므로)
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function removeRow() {
            if (data.length > 1) {
                data.pop();
                renderTable();
                updateChart();
            }
        }

        function updateChart() {
            const ctx = document.getElementById('sCurveChart').getContext('2d');
            
            const labels = data.map(d => d.month);
            const plannedMonthly = data.map(d => parseFloat(d.planned) || 0);
            
            let plannedCumData = [];
            let pSum = 0;
            for(let val of plannedMonthly) {
                pSum += val;
                plannedCumData.push(pSum.toFixed(2));
            }

            const actualMonthly = [];
            let actualCumData = [];
            let aSum = 0;

            for(let i=0; i<data.length; i++) {
                if (data[i].actual !== '' && data[i].actual !== null) {
                    let val = parseFloat(data[i].actual) || 0;
                    actualMonthly.push(val);
                    aSum += val;
                    actualCumData.push(aSum.toFixed(2));
                } else {
                    actualMonthly.push(null);
                    actualCumData.push(null);
                }
            }

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'line',
                            label: '계획 누계공정률 (%)',
                            data: plannedCumData,
                            borderColor: '#2563eb',
                            backgroundColor: '#2563eb',
                            borderWidth: 3,
                            pointBackgroundColor: '#ffffff',
                            pointBorderColor: '#2563eb',
                            pointBorderWidth: 2,
                            pointRadius: 3,
                            tension: 0.4, 
                            yAxisID: 'y',
                            fill: false,
                            order: 1
                        },
                        {
                            type: 'line',
                            label: '실적 누계공정률 (%)',
                            data: actualCumData,
                            borderColor: '#dc2626',
                            backgroundColor: '#dc2626',
                            borderWidth: 3,
                            pointBackgroundColor: '#ffffff',
                            pointBorderColor: '#dc2626',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            tension: 0.4,
                            yAxisID: 'y',
                            fill: false,
                            spanGaps: false,
                            order: 2
                        },
                        {
                            type: 'bar',
                            label: '계획 월간공정률 (%)',
                            data: plannedMonthly,
                            backgroundColor: 'rgba(147, 197, 253, 0.5)',
                            borderColor: 'rgba(59, 130, 246, 0.7)',
                            borderWidth: 1,
                            borderRadius: 2,
                            yAxisID: 'y',
                            order: 3
                        },
                        {
                            type: 'bar',
                            label: '실적 월간공정률 (%)',
                            data: actualMonthly,
                            backgroundColor: 'rgba(252, 165, 165, 0.7)',
                            borderColor: 'rgba(220, 38, 38, 0.8)',
                            borderWidth: 1,
                            borderRadius: 2,
                            yAxisID: 'y',
                            order: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: '전체 공정표',
                            font: { size: 18, weight: 'bold' },
                            padding: { top: 10, bottom: 30 }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    // 툴팁에서도 % 표시 제거, 데이터셋 라벨에서 단위를 보여줌
                                    return context.dataset.label + ': ' + context.parsed.y;
                                },
                                title: function(context) {
                                    return context[0].label + '개월'; // 툴팁 상단에만 '개월' 표시
                                }
                            }
                        },
                        legend: {
                            position: 'bottom'
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '공정률 (%)'
                            },
                            min: 0,
                            max: 100,
                            grid: {
                                color: '#e5e7eb',
                                borderDash: [5, 5]
                            }
                        }
                    }
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
